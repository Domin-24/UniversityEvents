version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: university-events-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "11111111"
      MYSQL_DATABASE: university_events_db
      TZ: Asia/Bangkok
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p11111111"]
      interval: 10s
      timeout: 5s
      retries: 12

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: university-events-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: "11111111"
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"

volumes:
  mysql_data:
